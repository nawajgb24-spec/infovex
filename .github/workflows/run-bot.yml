name: AI Auto Blogger

on:
  schedule:
    # Yeh cron timing ab har 2 ghante (120 minutes) me robot ko automatic chalaegi
    # Isse din bhar me natural gap ke sath 10-12 viral articles automatic bante rahenge
    - cron: '0 */2 * * *'
  workflow_dispatch: # Isse aap jab chahein manually bhi ek click me chala sakte hain

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: credentials/actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install libraries
        run: |
          pip install requests PyGithub pytrends

      - name: Run AI Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python static_blogger.py
