name: AI Auto Blogger

on:
  schedule:
    - cron: '0 */6 * * *' # Yeh har 6 ghante me automatic chalega
  workflow_dispatch: # Isse aap manually bhi ek click me chala sakte hain

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install libraries
        run: |
          pip install requests PyGithub pytrends

      - name: Run AI Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python static_blogger.py
        
        
        
