<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFOVEX — Global Daily Editorial</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;0,900;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --text: #111111; --border: #dddddd; --red: #b80000; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Playfair Display', Georgia, serif; }
        
        header { text-align: center; padding: 40px 20px 20px; border-bottom: 2px solid var(--text); }
        .logo { font-size: 58px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; color: var(--text); text-decoration: none; }
        
        nav { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; padding: 12px 20px; border-bottom: 1px double var(--text); font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; text-transform: uppercase; }
        nav a { color: var(--text); text-decoration: none; cursor: pointer; }
        nav a:hover, nav a.active { color: var(--red); text-decoration: underline; }

        .main-container { max-width: 1200px; margin: 40px auto; display: grid; grid-template-columns: 1fr; padding: 0 20px; }
        .section-title { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 800; text-transform: uppercase; border-bottom: 2px solid var(--text); padding-bottom: 5px; margin-bottom: 30px; }
        
        .post-card { display: flex; flex-direction: column; gap: 10px; padding-bottom: 30px; margin-bottom: 30px; border-bottom: 1px solid var(--border); }
        .post-meta { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 700; color: var(--red); text-transform: uppercase; }
        .post-card h2 { font-size: 32px; font-weight: 700; line-height: 1.2; }
        .post-card h2 a { color: var(--text); text-decoration: none; }
        .post-card h2 a:hover { text-decoration: underline; }
        .post-card p { font-size: 16px; color: #444; line-height: 1.6; }
        
        @media (max-width: 768px) { .logo { font-size: 40px; } .post-card h2 { font-size: 24px; } }
    </style>
</head>
<body>
    <header><a href="/" class="logo">INFOVEX</a></header>
    
    <nav id="category-nav">
        <a onclick="filterCat('All')">Home</a>
        <a onclick="filterCat('Anime')">Anime</a>
        <a onclick="filterCat('Trending News')">Trending News</a>
        <a onclick="filterCat('Tech')">Tech</a>
        <a onclick="filterCat('Sports')">Sports</a>
        <a onclick="filterCat('Business')">Business</a>
        <a onclick="filterCat('Lifestyle')">Lifestyle</a>
        <a onclick="filterCat('Stock News')">Stock News</a>
        <a onclick="filterCat('World')">World</a>
    </nav>

    <div class="main-container">
        <div class="section-title" id="sec-title">Top Stories</div>
        <div id="posts-container">
            </div>
    </div>

    <script>
        function filterCat(cat) {
            document.getElementById('sec-title').innerText = cat === 'All' ? 'Top Stories' : cat + ' News';
            let posts = document.querySelectorAll('.post-card');
            posts.forEach(post => {
                if(cat === 'All' || post.getAttribute('data-cat') === cat) {
                    post.style.display = 'flex';
                } else {
                    post.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
